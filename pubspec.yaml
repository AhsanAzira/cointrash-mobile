name: cointrash_mvp
description: "CoinTrash MVP - Aplikasi Daur Ulang Sampah Berbasis Insentif Koin"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.11.1
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/